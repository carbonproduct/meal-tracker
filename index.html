<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claudio C. - Diario Alimentare</title>
    <style>
        :root {
            --primary: #2e7d32;
            --primary-light: #e8f5e9;
            --text: #333;
            --bg: #f4f6f4;
            --border: #ccc;
            --border-thick: #2e7d32;
            --accent: #1565c0;
            --accent-light: #e3f2fd;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.5;
            color: var(--text);
            background-color: var(--bg);
            margin: 0;
            padding: 15px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }
        header {
            border-bottom: 3px solid var(--primary-light);
            padding-bottom: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        h1 { margin: 0; color: var(--primary); font-size: 22px; }
        .meta-info { font-size: 13px; color: #666; }
        
        /* Weight Tracker Widget */
        .weight-dashboard {
            background: var(--accent-light);
            border: 1px solid #bbdefb;
            border-radius: 8px;
            padding: 12px 15px;
            margin-bottom: 25px;
        }
        .weight-summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .weight-title {
            font-size: 14px;
            font-weight: bold;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .weight-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .weight-btn:hover { background: #0d47a1; }
        .weight-history {
            display: none;
            margin-top: 12px;
            border-top: 1px solid #bbdefb;
            padding-top: 10px;
        }
        .weight-table {
            width: 100%;
            max-width: 450px;
            border-collapse: collapse;
            font-size: 13px;
        }
        .weight-table th, .weight-table td {
            padding: 6px 10px;
            text-align: left;
        }
        .weight-table th { color: #555; font-weight: bold; }
        .weight-table tr:not(:last-child) { border-bottom: 1px solid #e0e0e0; }
        .trend-up { color: #2e7d32; font-weight: bold; }

        /* Filters Section */
        .filters-container {
            background: #fcfcfc;
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .search-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .search-group label {
            font-size: 12px;
            font-weight: bold;
            color: #444;
        }
        .search-group input {
            width: 75%;
            max-width: 600px;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            font-size: 14px;
            outline: none;
        }
        .search-group input:focus { border-color: var(--primary); }

        .multi-select-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .filter-box {
            flex: 1;
            min-width: 200px;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 10px;
            max-height: 150px;
            overflow-y: auto;
        }
        .filter-box-title {
            font-size: 12px;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 8px;
            border-bottom: 1px solid #eee;
            padding-bottom: 3px;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            margin-bottom: 6px;
            cursor: pointer;
        }
        .checkbox-label input { cursor: pointer; }

        /* Day Block Structure */
        .day-block {
            background: #fff;
            border: 3px solid var(--border-thick);
            border-radius: 8px;
            margin-bottom: 25px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }
        .day-header {
            background-color: var(--primary-light);
            color: var(--primary);
            padding: 10px 15px;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-thick);
        }
        .day-header .week-tag {
            background: var(--primary);
            color: #fff;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
        }
        
        .meal-row {
            display: grid;
            grid-template-columns: 120px 1fr 120px 2fr;
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            align-items: center;
            gap: 10px;
        }
        .meal-row:last-child { border-bottom: none; }
        .meal-slot { font-weight: 600; color: #555; }
        .meal-content { font-size: 14px; }
        .meal-notes { font-size: 13.5px; color: #555; }
        
        .day-block.hidden, .meal-row.hidden { display: none !important; }

        /* Status Badges */
        .badge {
            display: inline-block;
            padding: 4px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
        }
        .badge-perfetto, .badge-ottimo, .badge-approvato { background-color: #c8e6c9; color: #256029; }
        .badge-flessibile, .badge-regola-80-20, .badge-in-corso { background-color: #e1f5fe; color: #0288d1; }
        .badge-mancato { background-color: #ffecb3; color: #b78103; }
        .badge-attivo, .badge-pianificato { background-color: #ede7f6; color: #5e35b1; }
        .badge-surplus, .badge-mass-fuel { background-color: #ffe0b2; color: #e65100; }

        @media (max-width: 768px) {
            .meal-row {
                grid-template-columns: 1fr;
                gap: 5px;
                padding: 12px;
            }
            .search-group input { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>Piano alimentare di Claudio 🏋🏽</h1>
            <div class="meta-info">Obiettivo: Aumento Massa Muscolare (2300 kcal)</div>
        </div>
        <div class="meta-info" style="text-align: right;">
            <strong>File di riferimento:</strong> Piano alimentare Claudio C.pdf
        </div>
    </header>

    <!-- Weight Dashboard Widget -->
    <div class="weight-dashboard">
        <div class="weight-summary">
            <div class="weight-title">
                ⚖️ Ultimo Peso Rilevato: <strong id="latestWeightDisplay" style="font-size: 16px; margin-left: 5px; color: #0d47a1;">-- kg</strong> <span id="latestWeightDate" style="font-size: 12px; color: #555; font-weight: normal;"></span>
            </div>
            <button class="weight-btn" id="toggleWeightBtn" onclick="toggleWeight()">Mostra Storico</button>
        </div>
        <div class="weight-history" id="weightHistory">
            <table class="weight-table">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Peso</th>
                        <th>Variazione Totale Diet</th>
                    </tr>
                </thead>
                <tbody id="weightTableBody"></tbody>
            </table>
        </div>
    </div>

    <!-- Filters Panel -->
    <div class="filters-container">
        <div class="search-group">
            <label for="searchFilter">Cerca Alimento o Nota:</label>
            <input type="text" id="searchFilter" placeholder="Scrivi qui per filtrare all'istante (es. uova, pollo, pasta...)">
        </div>
        
        <div class="multi-select-container">
            <div class="filter-box">
                <div class="filter-box-title">Settimana</div>
                <div id="weekCheckboxGroup"></div>
            </div>

            <div class="filter-box">
                <div class="filter-box-title">Date Disponibili</div>
                <div id="dateCheckboxGroup"></div>
            </div>

            <div class="filter-box">
                <div class="filter-box-title">Etichette Pasti</div>
                <div id="tagCheckboxGroup"></div>
            </div>
        </div>
    </div>

    <!-- Journal Daily Blocks Container -->
    <div id="journalContainer"></div>
</div>

<!-- EXTERNAL DATA SOURCE FILE -->
<script src="data.js"></script>

<script>
    function toggleWeight() {
        const historyDiv = document.getElementById('weightHistory');
        const btn = document.getElementById('toggleWeightBtn');
        if (historyDiv.style.display === 'block') {
            historyDiv.style.display = 'none';
            btn.textContent = 'Mostra Storico';
        } else {
            historyDiv.style.display = 'block';
            btn.textContent = 'Nascondi';
        }
    }

    function renderWeightWidget() {
        if (typeof WEIGHT_DATA === 'undefined' || WEIGHT_DATA.length === 0) return;
        const sortedWeights = [...WEIGHT_DATA].reverse();
        const baseWeight = WEIGHT_DATA[0].weight; 
        const latest = sortedWeights[0];
        document.getElementById('latestWeightDisplay').textContent = `${latest.weight.toFixed(1)} kg`;
        document.getElementById('latestWeightDate').textContent = `(${latest.date.split(' ')[1]} ${latest.date.split(' ')[2]})`;
        
        const tableBody = document.getElementById('weightTableBody');
        tableBody.innerHTML = '';
        sortedWeights.forEach(entry => {
            const tr = document.createElement('tr');
            const totalDiff = entry.weight - baseWeight;
            let diffText = "Inizio";
            let diffClass = "";
            if (entry.weight !== baseWeight) {
                diffText = totalDiff >= 0 ? `+${totalDiff.toFixed(1)} kg` : `${totalDiff.toFixed(1)} kg`;
                if (totalDiff > 0) diffClass = "trend-up";
            }
            tr.innerHTML = `<td>${entry.date}</td><td><strong>${entry.weight.toFixed(1)} kg</strong></td><td class="${diffClass}">${diffText}</td>`;
            tableBody.appendChild(tr);
        });
    }

    function renderJournal() {
        if (typeof JOURNAL_DATA === 'undefined' || JOURNAL_DATA.length === 0) return;
        const sortedJournal = [...JOURNAL_DATA].sort((a, b) => new Date(b.sortDate) - new Date(a.sortDate));
        const container = document.getElementById('journalContainer');
        container.innerHTML = '';
        
        sortedJournal.forEach(day => {
            const block = document.createElement('div');
            block.className = 'day-block';
            block.setAttribute('data-week', day.week);
            block.setAttribute('data-date', day.date);
            
            let html = `<div class="day-header"><span>Data: ${day.date}</span><span class="week-tag">${day.week}</span></div>`;
            day.meals.forEach(meal => {
                const badgeClass = `badge-${meal.status.toLowerCase().replace(/ /g, '-')}`;
                html += `
                    <div class="meal-row" data-tag="${meal.tag}">
                        <div class="meal-slot">${meal.slot}</div>
                        <div class="meal-content">${meal.content}</div>
                        <div><span class="badge ${badgeClass}">${meal.status}</span></div>
                        <div class="meal-notes">${meal.notes}</div>
                    </div>`;
            });
            block.innerHTML = html;
            container.appendChild(block);
        });
    }

    function setupFilters() {
        if (typeof JOURNAL_DATA === 'undefined') return;
        const weeks = Array.from(new Set(JOURNAL_DATA.map(d => d.week))).sort();
        const sortedDates = [...JOURNAL_DATA].sort((a,b) => new Date(b.sortDate) - new Date(a.sortDate)).map(d => d.date);
        const tags = ["Colazione", "Spuntino", "Pranzo", "Merenda", "Cena", "Idratazione", "Attività", "Extra"];
        
        document.getElementById('weekCheckboxGroup').innerHTML = weeks.map(w => `<label class="checkbox-label"><input type="checkbox" class="week-checkbox" value="${w}" checked> ${w}</label>`).join('');
        document.getElementById('dateCheckboxGroup').innerHTML = sortedDates.map(d => `<label class="checkbox-label"><input type="checkbox" class="date-checkbox" value="${d}" checked> ${d.split(' ')[1]} ${d.split(' ')[2]}</label>`).join('');
        document.getElementById('tagCheckboxGroup').innerHTML = tags.map(t => `<label class="checkbox-label"><input type="checkbox" class="tag-checkbox" value="${t}" checked> ${t}</label>`).join('');
    }

    function applyFilters() {
        const searchText = document.getElementById('searchFilter').value.toLowerCase();
        const activeWeeks = Array.from(document.querySelectorAll('.week-checkbox:checked')).map(cb => cb.value);
        const activeDates = Array.from(document.querySelectorAll('.date-checkbox:checked')).map(cb => cb.value);
        const activeTags = Array.from(document.querySelectorAll('.tag-checkbox:checked')).map(cb => cb.value);
        
        document.querySelectorAll('.day-block').forEach(block => {
            const blockWeek = block.getAttribute('data-week');
            const blockDate = block.getAttribute('data-date');
            let visibleRowsInBlock = 0;

            block.querySelectorAll('.meal-row').forEach(row => {
                const matchesSearch = row.textContent.toLowerCase().includes(searchText);
                if (matchesSearch && activeWeeks.includes(blockWeek) && activeDates.includes(blockDate) && activeTags.includes(row.getAttribute('data-tag'))) {
                    row.classList.remove('hidden');
                    visibleRowsInBlock++;
                } else {
                    row.classList.add('hidden');
                }
            });
            if (visibleRowsInBlock > 0) block.classList.remove('hidden'); else block.classList.add('hidden');
        });
    }

    // Init Execution
    renderWeightWidget();
    renderJournal();
    setupFilters();

    document.getElementById('searchFilter').addEventListener('input', applyFilters);
    document.addEventListener('change', e => { if(e.target.matches('.week-checkbox, .date-checkbox, .tag-checkbox')) applyFilters(); });
</script>
</body>
</html>
